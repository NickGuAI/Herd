name: Docs link check

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'SECURITY.md'
      - 'apps/herd/docs/**'
      - 'apps/herd/public/repo-root/**'
      - 'apps/herd/tools/check-docs.ts'
      - '.github/workflows/docs-link-check.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'SECURITY.md'
      - 'apps/herd/docs/**'
      - 'apps/herd/public/repo-root/**'
      - 'apps/herd/tools/check-docs.ts'
      - '.github/workflows/docs-link-check.yml'
  workflow_dispatch: {}

jobs:
  docs-link-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace deps
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Build workspace deps for docs checker
        run: pnpm --filter herd run build:deps

      - name: Run docs link check
        run: pnpm --filter herd run docs:check
