name: Herd public artifact CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  artifact:
    name: Build, docs, and artifact cleanliness
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout public artifact
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Herd
        run: pnpm --filter herd build

      - name: Check app docs contract
        run: pnpm --filter herd run docs:check

      - name: Check docs links
        run: node scripts/check-doc-links.mjs

      - name: Check public artifact cleanliness
        run: bash scripts/check-public-artifact.sh

  install-from-scratch:
    name: Install from scratch
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout public artifact
        uses: actions/checkout@v4

      - name: Run installer with hermetic toolchain path
        env:
          HERD_CHECKOUT_DIR: ${{ github.workspace }}
          HERD_CONFIGURE_PROVIDERS: "0"
          HERD_DATA_DIR: ${{ runner.temp }}/herd-data
          HERD_INSTALL_AUTOSTART: "0"
          HERD_INSTALL_TIMEOUT_SECONDS: "60"
          HERD_TOOLCHAIN_DIR: ${{ runner.temp }}/herd-toolchain
        run: bash install.sh

  enterprise-deploy-smoke:
    name: Enterprise EC2 deploy smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout public artifact
        uses: actions/checkout@v4

      - name: Run EC2 deploy lane smoke
        run: bash operations/deploy/ec2/smoke-test.sh --container
